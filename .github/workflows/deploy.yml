name: Deploy to Test Production

on:
  push:
    branches:
      - master
  workflow_dispatch:
    

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: SSH and Redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/FIQO
            docker compose exec nonebot pip install --no-cache-dir --upgrade "nonebot-plugin-fiqo @ git+https://ghfast.top/https://github.com/Christoph-UGameGerm/nonebot-plugin-fiqo.git@master"
            docker compose restart nonebot
      - name: Notify via Bark
        run: |
            curl "https://api.day.app/${{ secrets.BARK_TOKEN }}/Github:%20FIQO-Deploy-Complete/部署完成！"  
